<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindful-Me | 500 - {{ _('Sunucu Hatası') }}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            color: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.12);
            padding: 3.5rem 2.5rem;
            width: 100%;
            max-width: 500px;
            text-align: center;
            transition: transform 0.3s;
        }

        .glass-card:hover {
            transform: scale(1.02);
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            color: #2c3e50;
            font-weight: bold;
            border-radius: 50px;
            padding: 12px 30px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
            color: #2c3e50;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .error-code {
            font-size: 7rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e74c3c, #ff758c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            line-height: 1;
            letter-spacing: -2px;
        }

        .illustration {
            font-size: 5rem;
            animation: rotate 6s ease-in-out infinite;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        @keyframes rotate {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(15deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-auto">
                <div class="glass-card">
                    <span class="illustration">🌀</span>
                    <div class="error-code">500</div>
                    <h2 class="fw-bold mb-3" style="color: #e74c3c;">{{ _('Zihinde Küçük Bir Fırtına') }}</h2>
                    <p class="text-muted mb-4" style="font-size: 1.05rem; line-height: 1.6;">
                        {{ _('Sunucumuz şu an yoğun bir düşünce dalgası içinde. Bu durum geçicidir, o yüzden lütfen derin bir nefes alın ve biraz sonra tekrar deneyin.') }}
                    </p>
                    <a href="{{ url_for('main.index') }}" class="btn btn-glass">
                        🌿 {{ _('Ana Sayfaya Dön') }}
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
